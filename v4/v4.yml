            二、事件概述 用 100-200 字高度概括事件的背景、规模（总样本量）与当前的整体情绪极性（占比数据）。

            三、事件时间线 (核心：必须在此处生成 Mermaid 时序图或流程图) 将证据池中所有关于事件进程的信息梳理清晰。

            强制指令：请使用 ```mermaid 语法，绘制出事件发展的关键节点或因果链条（推荐使用 graph TD 或 sequenceDiagram）。

            图表下方辅以文字说明：首次出现的出处、引发转折的关键发声，以及扩散路径。

            四、核心矛盾拆解

            矛盾的主要双方是谁？各自的核心诉求是什么？（每一项诉求必须引用证据池原文，格式：“原文内容”——来源）

